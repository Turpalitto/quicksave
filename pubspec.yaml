name: quicksave
description: QuickSave — save public Instagram photos and videos via Share Intent. Gallery, profiles, batch download.
publish_to: "none"
version: 1.3.4+11

environment:
  sdk: ">=3.10.0 <4.0.0"
  flutter: ">=3.44.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  flutter_riverpod: ^3.3.2

  # HTTP
  dio: ^5.4.0

  # Local storage
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2

  # System integration
  open_filex: ^4.3.4
  share_plus: ^7.2.2
  flutter_local_notifications: ^17.0.0
  permission_handler: ^11.2.0

  # Utils
  intl: ^0.20.2
  uuid: ^4.2.0
  package_info_plus: ^8.0.0
  cached_network_image: ^3.4.1
  video_player: ^2.9.2
  archive: ^3.6.1
  path: ^1.9.0
  crypto: ^3.0.3
  workmanager: ^0.9.0
  in_app_purchase: ^3.2.0
  url_launcher: ^6.3.0
  connectivity_plus: ^7.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  generate: true


