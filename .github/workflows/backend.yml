name: Backend

on:
  push:
    paths:
      - 'backend/**'
  pull_request:
    paths:
      - 'backend/**'

jobs:
  test:
    name: Backend tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install
        working-directory: backend
        run: npm ci || npm install

      - name: Test
        working-directory: backend
        run: npm test

      - name: Lint (basic)
        working-directory: backend
        run: |
          # Простая проверка синтаксиса через node --check
          for f in $(find src -name '*.js'); do
            node --check "$f" || exit 1
          done
