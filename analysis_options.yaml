# Статический анализ Dart для QuickSave.
# Базируется на flutter_lints (подключён в pubspec.yaml dev_dependencies),
# который уже включает рекомендуемый набор правил. Здесь добавляем только
# строгие настройки analyzer-а и несколько дополнительных проверок.
include: package:flutter_lints/flutter.yaml

analyzer:
  language:
    strict-casts: true
    strict-raw-types: true
  exclude:
    - build/**
    - .dart_tool/**
    - '**/*.g.dart'
    - '**/*.freezed.dart'
  errors:
    # Обязательные для правки.
    missing_required_param: error
    missing_return: error
    todo: ignore

linter:
  rules:
    # Дополнения к flutter_lints (поверх его набора).
    prefer_single_quotes: true
    prefer_final_locals: true
    prefer_final_in_for_each: true
    prefer_typing_uninitialized_variables: true
    unnecessary_lambdas: true
    avoid_returning_null_for_void: true
    avoid_unused_constructor_parameters: true
    use_named_constants: true
    use_string_buffers: true
    # Корректность (часть из них есть в flutter_lints — дубли безопасен).
    cancel_subscriptions: true
    close_sinks: true
    collection_methods_unrelated_type: true
